<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Dabioch Web</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/core.css">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container nav-wrapper">
      <div class="logo">Dabioch Web</div>
      <button class="menu-toggle">☰</button>
      <ul class="nav-links">
        <li><a href="#">Start</a></li>
        <li><a href="#">Oferta</a></li>
        <li><a href="#">Kontakt</a></li>
      </ul>
    </div>
  </nav>

  <!-- HERO -->
  <section class="section hero">
    <div class="container">
      <h1>Nowoczesne strony internetowe</h1>
      <p>Tworzę szybkie i estetyczne strony dla firm</p>
      <a href="#" class="btn primary">Skontaktuj się</a>
    </div>
  </section>

  <!-- OFERTA -->
  <section class="section">
    <div class="container grid-3">
      
      <div class="card">
        <h3>Strony wizytówki</h3>
        <p>Proste strony dla firm</p>
      </div>

      <div class="card">
        <h3>Landing page</h3>
        <p>Strony sprzedażowe</p>
      </div>

      <div class="card">
        <h3>Poprawki</h3>
        <p>Optymalizacja i zmiany</p>
      </div>

    </div>
  </section>

  <!-- FORMULARZ -->
  <section class="section">
    <div class="container">
      <form action=https://formspree.io/f/xlgavvwv method=post class="form">
        <input type="text" name=name placeholder="Imię" required>
        <input type="email" name=email placeholder="Email" required>
        <textarea name=message placeholder="Wiadomość"></textarea>
        <button type=submit class="btn primary">Wyślij</button>
      </form>
    </div>
  </section>

  <script src="js/skrypt.js"></script>
</body>
</html>
